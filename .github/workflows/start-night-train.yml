name: Start Night Train

# ─────────────────────────────────────────────────────────────────
# Night Train v3 — Queue-driven, branch from main
# Reads first OPEN issue from ops/night-queue.json → dispatches Jules.
# Jules branches from main, PRs target main. No intermediate branch.
# ─────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  kick:
    name: Kick first open issue from queue
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout main (to read queue file) ─────────────────────
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main

      # ── 2. Find first OPEN issue in queue ─────────────────────────
      - name: Read queue and find first open issue
        id: find-issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const queuePath = 'ops/night-queue.json';

            if (!fs.existsSync(queuePath)) {
              core.setFailed(`Queue file ${queuePath} not found.`);
              return;
            }

            const queue = JSON.parse(fs.readFileSync(queuePath, 'utf-8'));
            if (!Array.isArray(queue) || queue.length === 0) {
              core.setFailed('Queue must be a non-empty JSON array.');
              return;
            }

            console.log(`[kick] Queue: [${queue.join(', ')}] (${queue.length} issues)`);

            for (let idx = 0; idx < queue.length; idx++) {
              const num = queue[idx];
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                if (issue.state === 'open') {
                  console.log(`[kick] ✅ First open issue: #${num} — ${issue.title}`);
                  console.log(`[kick] TELEMETRY: kick_issue=${num} kick_index=${idx} queue_length=${queue.length}`);
                  core.setOutput('issue_number', String(num));
                  core.setOutput('issue_title', issue.title);
                  core.setOutput('issue_body', issue.body || '');
                  return;
                }
                console.log(`[kick] Skip #${num} (${issue.state})`);
              } catch (e) {
                console.log(`[kick] Skip #${num} (error: ${e.message})`);
              }
            }

            core.setFailed('No open issues found in queue. Sprint may be complete.');

      # ── 3. Setup Python (for Jules API call) ──────────────────────
      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      # ── 4. Dispatch to Jules API ──────────────────────────────────
      - name: Invoke Jules API
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.find-issue.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.find-issue.outputs.issue_body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ -z "${JULES_API_KEY:-}" ]; then
            echo "::error::JULES_API_KEY secret is not set."
            echo "Run: gh secret set JULES_API_KEY --repo ${{ github.repository }}"
            exit 1
          fi

          python3 - <<'PYEOF'
          import json, os, sys, urllib.request, urllib.error

          num     = os.environ["ISSUE_NUMBER"]
          title   = os.environ["ISSUE_TITLE"]
          body    = os.environ["ISSUE_BODY"]
          owner   = os.environ["REPO_OWNER"]
          repo    = os.environ["REPO_NAME"]
          api_key = os.environ["JULES_API_KEY"]

          prompt = "\n".join([
            "You are Jules, an AI coding agent working on the betadvisor-app repository.",
            "",
            "## Your Task",
            f"Solve GitHub Issue #{num}: {title}",
            "",
            "## Issue Body",
            body,
            "",
            "## Repository Rules",
            "- Read AGENTS.md at the repo root for ALL coding conventions before writing any code.",
            "- NEVER throw at module top-level for missing env vars. Use handler-level guards.",
            f'- Your PR body MUST contain "Closes #{num}".',
            "- Your PR MUST target the main branch.",
            "- Backend CI: cd apps/backend/src && python manage.py check",
            "- Migration rule: 1 migration maximum per PR.",
            "- Stripe rule: all Stripe logic in services.py or webhooks.py only.",
            "- application_fee_percent MUST be 20 (explicit constant).",
            "",
            "## Branch Convention",
            "Create your working branch from main (the starting branch).",
            f"Branch naming: jules/{num}-<short-slug>",
          ])

          payload = json.dumps({
            "prompt": prompt,
            "sourceContext": {
              "source": f"sources/github/{owner}/{repo}",
              "githubRepoContext": {"startingBranch": "main"},
            },
            "requirePlanApproval": False,
            "automationMode": "AUTO_CREATE_PR",
          }).encode()

          req = urllib.request.Request(
            "https://jules.googleapis.com/v1alpha/sessions",
            data=payload,
            headers={
              "Content-Type": "application/json",
              "X-Goog-Api-Key": api_key,
            },
            method="POST",
          )

          print(f"[kick] Dispatching issue #{num} to Jules...")
          try:
            with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
              session = result.get("name", "unknown")
              print(f"[kick] ✅ Jules session: {session}")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                f.write(f"JULES_SESSION={session}\n")
          except urllib.error.HTTPError as e:
            err_body = e.read().decode(errors="replace")
            print(f"[kick] ❌ Jules API error ({e.code}):", file=sys.stderr)
            try:
              print(json.dumps(json.loads(err_body), indent=2), file=sys.stderr)
            except Exception:
              print(err_body, file=sys.stderr)
            sys.exit(1)
          PYEOF

      # ── 5. Comment on issue ───────────────────────────────────────
      - name: Comment on dispatched issue
        if: success()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const num = parseInt('${{ steps.find-issue.outputs.issue_number }}', 10);
            const session = process.env.JULES_SESSION || 'unknown';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              body: [
                `🚂 **Night Train v3** dispatched this issue to Jules.`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Issue | #${num} |`,
                `| Session | \`${session}\` |`,
                `| Run | [${context.runId}](${runUrl}) |`,
                `| Base branch | \`main\` |`,
                `| Triggered by | @${context.actor} |`,
                `| Time | ${new Date().toISOString()} |`,
              ].join('\n'),
            });
            console.log(`[kick] Commented on issue #${num}`);
