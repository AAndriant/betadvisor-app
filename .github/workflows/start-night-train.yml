name: Start Night Train

# ─────────────────────────────────────────────────────────────────────────────
# v2 — Queue-driven Night Train
# Reads first OPEN issue from ops/night-queue.json and dispatches to Jules.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  start-night-train:
    name: Start Night Train (Queue-driven)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup gh CLI token ───────────────────────────────────────────────
      - name: Configure gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth setup-git

      # ── 3. Ensure jules/train branch ────────────────────────────────────────
      - name: Ensure jules/train branch exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/branches/jules%2Ftrain" &>/dev/null; then
            echo "Branch jules/train exists ✅"
          else
            echo "Creating jules/train from main..."
            git checkout -b jules/train origin/main
            git push origin jules/train
            echo "Branch jules/train created ✅"
          fi

      # ── 4. Read first OPEN issue from queue ─────────────────────────────────
      - name: Find first open issue from night-queue.json
        id: find-issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Read the queue file
            const queuePath = 'ops/night-queue.json';
            if (!fs.existsSync(queuePath)) {
              core.setFailed(`Queue file ${queuePath} not found. Create it first.`);
              return;
            }

            const queue = JSON.parse(fs.readFileSync(queuePath, 'utf-8'));
            if (!Array.isArray(queue) || queue.length === 0) {
              core.setFailed(`Queue file must be a non-empty JSON array. Got: ${JSON.stringify(queue)}`);
              return;
            }

            console.log(`[night-train] Queue: [${queue.join(', ')}] (${queue.length} issues)`);

            // Find the first OPEN issue in the queue
            for (const num of queue) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: num,
                });

                if (issue.state === 'open') {
                  console.log(`[night-train] First open issue: #${num} — ${issue.title}`);
                  core.setOutput('issue_number', String(num));
                  core.setOutput('issue_title', issue.title);
                  core.setOutput('issue_body', issue.body || '(no body)');
                  return;
                } else {
                  console.log(`[night-train] Skipping #${num} (${issue.state})`);
                }
              } catch (e) {
                console.log(`[night-train] Skipping #${num} (error: ${e.message})`);
              }
            }

            core.setFailed('No open issues found in the queue. All done or queue is stale.');

      # ── 5. Setup Python ─────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      # ── 6. Invoke Jules API ─────────────────────────────────────────────────
      - name: Invoke Jules API
        id: invoke-jules
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.find-issue.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.find-issue.outputs.issue_body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ -z "${JULES_API_KEY:-}" ]; then
            echo "JULES_API_KEY secret is not set."
            echo "Run: gh secret set JULES_API_KEY --repo ${{ github.repository }}"
            exit 1
          fi

          python3 - <<'PYEOF'
          import json, os, sys, urllib.request, urllib.error

          num     = os.environ["ISSUE_NUMBER"]
          title   = os.environ["ISSUE_TITLE"]
          body    = os.environ["ISSUE_BODY"]
          owner   = os.environ["REPO_OWNER"]
          repo    = os.environ["REPO_NAME"]
          api_key = os.environ["JULES_API_KEY"]

          prompt = "\n".join([
            "You are Jules, an AI coding agent working on the betadvisor-app repository.",
            "",
            "## Your Task",
            f"Solve GitHub Issue #{num}: {title}",
            "",
            "## Issue Body",
            body,
            "",
            "## Repository Rules",
            "- Read AGENTS.md at the repo root for ALL coding conventions before writing any code.",
            "- NEVER throw at module top-level for missing env vars. Use handler-level guards.",
            f"- Your PR body MUST contain \"Closes #{num}\".",
            "- Backend CI: cd apps/backend/src && python manage.py check",
            "- Migration rule: 1 migration maximum per PR. Never generate 2 in the same app.",
            "- Stripe rule: all Stripe logic in services.py or webhooks.py only, never in views.py.",
            "- application_fee_percent MUST be 20 (explicit constant, never settings.PLATFORM_FEE_PERCENT).",
            "",
            "## Branch Convention",
            "Create your working branch from jules/train (the starting branch).",
            f"Branch naming: jules/{num}-<short-slug>",
          ])

          payload = json.dumps({
            "prompt": prompt,
            "sourceContext": {
              "source": f"sources/github/{owner}/{repo}",
              "githubRepoContext": {"startingBranch": "jules/train"},
            },
            "requirePlanApproval": False,
            "automationMode": "AUTO_CREATE_PR",
          }).encode()

          req = urllib.request.Request(
            "https://jules.googleapis.com/v1alpha/sessions",
            data=payload,
            headers={
              "Content-Type": "application/json",
              "X-Goog-Api-Key": api_key,
            },
            method="POST",
          )

          print(f"[start-night-train] Invoking Jules API for issue #{num}...")

          try:
            with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
              session = result.get("name", "unknown")
              print(f"[start-night-train] Jules session created: {session}")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                f.write(f"JULES_SESSION={session}\n")
          except urllib.error.HTTPError as e:
            body = e.read().decode(errors="replace")
            print(f"[start-night-train] Jules API error ({e.code}):", file=sys.stderr)
            try:
              err = json.loads(body)
              print(json.dumps({"status": err.get("status"), "message": err.get("message")}, indent=2), file=sys.stderr)
            except Exception:
              print("(non-JSON response)", file=sys.stderr)
            sys.exit(1)
          PYEOF

      # ── 7. Comment on issue ─────────────────────────────────────────────────
      - name: Comment on dispatched issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        if: success()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.find-issue.outputs.issue_number }}', 10);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const session = process.env.JULES_SESSION || 'unknown';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `🚂 **Night Train v2 started** via \`workflow_dispatch\``,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Issue | #${issueNumber} |`,
                `| Run | [${context.runId}](${runUrl}) |`,
                `| Jules session | \`${session}\` |`,
                `| Starting branch | \`jules/train\` |`,
                `| Triggered by | @${context.actor} |`,
                `| Time | ${new Date().toISOString()} |`,
                ``,
                `Jules will create branch \`jules/${issueNumber}-<slug>\` and open a PR with \`Closes #${issueNumber}\`.`,
                ``,
                `> Queue-driven dispatch — no label required. Autoqueue will chain subsequent issues.`,
              ].join('\n'),
            });

            console.log(`Commented on issue #${issueNumber}`);
