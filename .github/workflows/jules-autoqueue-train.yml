name: Jules — Autoqueue Train

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# ─────────────────────────────────────────────────────────────
# CRITIQUE : cancel-in-progress DOIT être false
# On veut traiter TOUS les events, jamais en annuler un.
# ─────────────────────────────────────────────────────────────
concurrency:
  group: jules-train-queue
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────
# Permissions explicites requises (read-only par défaut sur
# workflow_run — Bug 3 v1 validé)
# ─────────────────────────────────────────────────────────────
permissions:
  contents: write        # requis pour repos.merge + reading queue file
  issues: write          # requis pour addLabels / removeLabel / comments
  pull-requests: write   # requis pour pulls.list

jobs:
  autoqueue:
    # ⚠️ TRIPLE GUARD — pièce centrale du Night Train v2 :
    # 1. CI doit être passée (success)
    # 2. La branche doit commencer par jules/
    # 3. La branche ne doit PAS être jules/train elle-même
    #    (évite la boucle infinie sur push train → CI → autoqueue)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'jules/') &&
      github.event.workflow_run.head_branch != 'jules/train'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (for ops/night-queue.json)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Autoqueue — merge, label, find NEXT from queue, invoke Jules
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const headBranch = context.payload.workflow_run.head_branch;
            console.log(`[autoqueue] Processing branch: ${headBranch}`);

            // ─── 1. Find the PR for this branch ──────────────────────
            // ⚠️ NE PAS utiliser workflow_run.pull_requests (souvent vide)
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${headBranch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              console.log(`[autoqueue] No open PR found for ${headBranch}. Skipping.`);
              return;
            }

            const pr = prs[0];
            console.log(`[autoqueue] Found PR #${pr.number}: ${pr.title}`);

            // ─── 2. Merge PR → jules/train ───────────────────────────
            try {
              await github.rest.repos.merge({
                owner, repo,
                base: 'jules/train',
                head: headBranch,
                commit_message: `[train] Merge ${headBranch} (PR #${pr.number})`,
              });
              console.log(`[autoqueue] Merged ${headBranch} → jules/train ✅`);
            } catch (mergeErr) {
              console.error(`[autoqueue] Merge failed: ${mergeErr.message}`);
              // Conflit → label needs:human et stop proprement
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: pr.number,
                labels: ['needs:human'],
              });
              return;
            }

            // ─── 3. Extract current issue ID — BRANCH-FIRST ─────────
            // Branch naming: jules/<issueId>-slug
            const branchMatch = headBranch.match(/^jules\/(\d+)/);

            let issueNumber = null;

            if (branchMatch) {
              issueNumber = parseInt(branchMatch[1], 10);
              console.log(`[autoqueue] Issue from branch: #${issueNumber}`);
            } else {
              // Fallback: Closes #N in PR body
              const bodyMatch = (pr.body || '').match(/(?:closes|fixes|resolves)\s*:?\s*#(\d+)/i);
              if (bodyMatch) {
                issueNumber = parseInt(bodyMatch[1], 10);
                console.log(`[autoqueue] Issue from PR body: #${issueNumber}`);
              }
            }

            if (!issueNumber) {
              console.error('[autoqueue] ❌ Could not extract issue number from branch or PR body.');
              console.error('[autoqueue] STOP — needs:human. Branch: ' + headBranch);
              // Try to label the PR for human attention
              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.number,
                  labels: ['needs:human'],
                });
              } catch (e) { /* best effort */ }
              return;
            }

            // ─── 4. Mark current issue as ready + close ──────────────
            try {
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issueNumber,
                labels: ['ready'],
              });
              try {
                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: issueNumber,
                  name: 'agent:jules',
                });
              } catch (e) { /* label absent: OK */ }
              // Auto-close the issue (fixes #33)
              try {
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: issueNumber,
                  state: 'closed',
                });
                console.log(`[autoqueue] Closed issue #${issueNumber} ✅`);
              } catch (e) {
                console.log(`[autoqueue] Could not close #${issueNumber}: ${e.message}`);
              }
            } catch (e) {
              console.log(`[autoqueue] Label update failed on #${issueNumber}: ${e.message}`);
            }

            // ─── 5. Read queue from ops/night-queue.json ─────────────
            const queuePath = 'ops/night-queue.json';
            if (!fs.existsSync(queuePath)) {
              console.error(`[autoqueue] ❌ Queue file ${queuePath} not found on main.`);
              console.error('[autoqueue] STOP — no queue to process.');
              return;
            }

            let queue;
            try {
              queue = JSON.parse(fs.readFileSync(queuePath, 'utf-8'));
            } catch (e) {
              console.error(`[autoqueue] ❌ Failed to parse ${queuePath}: ${e.message}`);
              return;
            }

            if (!Array.isArray(queue)) {
              console.error(`[autoqueue] ❌ Queue must be a JSON array. Got: ${typeof queue}`);
              return;
            }

            console.log(`[autoqueue] Queue: [${queue.join(', ')}] (${queue.length} items)`);

            // ─── 6. Find current issue index in queue ────────────────
            const currentIdx = queue.indexOf(issueNumber);
            if (currentIdx === -1) {
              console.log(`[autoqueue] Issue #${issueNumber} not found in queue. STOP — no chaining.`);
              // Not an error: could be an out-of-queue fix. Just don't chain.
              return;
            }

            console.log(`[autoqueue] Issue #${issueNumber} is at queue index ${currentIdx}`);

            // ─── 7. Scan for NEXT open issue (skip CLOSED) ──────────
            let nextIssueNumber = null;
            let nextIssue = null;

            for (let i = currentIdx + 1; i < queue.length; i++) {
              const candidateNum = queue[i];
              try {
                const { data: candidate } = await github.rest.issues.get({
                  owner, repo,
                  issue_number: candidateNum,
                });

                if (candidate.state !== 'open') {
                  console.log(`[autoqueue] Skipping #${candidateNum} (state: ${candidate.state})`);
                  continue;
                }

                // Guard: check if a jules/* PR already exists for this issue
                const { data: existingPRs } = await github.rest.pulls.list({
                  owner, repo,
                  state: 'open',
                  per_page: 100,
                });

                const alreadyHasPR = existingPRs.some(p =>
                  p.head.ref.startsWith(`jules/${candidateNum}`)
                );

                if (alreadyHasPR) {
                  console.log(`[autoqueue] Skipping #${candidateNum} — jules/* PR already exists.`);
                  continue;
                }

                nextIssueNumber = candidateNum;
                nextIssue = candidate;
                break;
              } catch (e) {
                console.log(`[autoqueue] Could not fetch #${candidateNum}: ${e.message}. Skipping.`);
                continue;
              }
            }

            if (!nextIssueNumber || !nextIssue) {
              console.log('[autoqueue] 🏁 No more open issues in queue. Night Train complete!');
              return;
            }

            console.log(`[autoqueue] NEXT issue: #${nextIssueNumber} — ${nextIssue.title}`);

            // ─── 8. Label NEXT issue ─────────────────────────────────
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: nextIssueNumber,
              labels: ['agent:jules'],
            });

            // ─── 9. Invoke Jules API for NEXT issue ──────────────────
            const julesApiKey = process.env.JULES_API_KEY;
            if (!julesApiKey) {
              console.error('[autoqueue] ❌ JULES_API_KEY not set. Cannot invoke Jules API.');
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: nextIssueNumber,
                labels: ['needs:human'],
              });
              return;
            }

            const nextBody = nextIssue.body || '(no body)';
            const prompt = [
              `You are Jules, an AI coding agent working on the betadvisor-app repository.`,
              ``,
              `## Your Task`,
              `Solve GitHub Issue #${nextIssueNumber}: ${nextIssue.title}`,
              ``,
              `## Issue Body`,
              nextBody,
              ``,
              `## Repository Rules`,
              `- Read AGENTS.md at the repo root for ALL coding conventions before writing any code.`,
              `- NEVER throw at module top-level for missing env vars. Use handler-level guards.`,
              `- Your PR body MUST contain "Closes #${nextIssueNumber}".`,
              `- Backend CI: cd apps/backend/src && python manage.py check`,
              `- Migration rule: 1 migration maximum per PR. Never generate 2 in the same app.`,
              `- Stripe rule: all Stripe logic in services.py or webhooks.py only, never in views.py.`,
              `- application_fee_percent MUST be 20 (explicit constant, not from settings.PLATFORM_FEE_PERCENT).`,
              ``,
              `## Branch Convention`,
              `Create your working branch from jules/train (the starting branch).`,
              `Branch naming: jules/${nextIssueNumber}-<short-slug>`,
            ].join('\n');

            const payload = {
              prompt,
              sourceContext: {
                source: `sources/github/${owner}/${repo}`,
                githubRepoContext: {
                  startingBranch: 'jules/train',
                },
              },
              requirePlanApproval: false,
              automationMode: 'AUTO_CREATE_PR',
            };

            console.log(`[autoqueue] Invoking Jules API for issue #${nextIssueNumber}...`);
            const response = await fetch('https://jules.googleapis.com/v1alpha/sessions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': julesApiKey,
              },
              body: JSON.stringify(payload),
            });

            const result = await response.json();
            if (response.ok) {
              console.log(`[autoqueue] ✅ Jules session created: ${result.name}`);
              console.log(`[autoqueue] Dispatched Jules on #${nextIssueNumber}`);

              // Comment on the next issue
              try {
                const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: nextIssueNumber,
                  body: [
                    `🚂 **Autoqueue** dispatched Jules on this issue.`,
                    ``,
                    `| Field | Value |`,
                    `|-------|-------|`,
                    `| Previous | #${issueNumber} |`,
                    `| Jules session | \`${result.name}\` |`,
                    `| Run | [${context.runId}](${runUrl}) |`,
                    `| Queue position | ${queue.indexOf(nextIssueNumber) + 1}/${queue.length} |`,
                  ].join('\n'),
                });
              } catch (e) {
                console.log(`[autoqueue] Could not comment on #${nextIssueNumber}: ${e.message}`);
              }
            } else {
              console.error(`[autoqueue] ❌ Jules API error (${response.status}): ${JSON.stringify(result)}`);
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: nextIssueNumber,
                labels: ['needs:human'],
              });
            }
