name: Jules — Autoqueue Train

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# ─────────────────────────────────────────────────────────────
# CRITIQUE : cancel-in-progress DOIT être false
# On veut traiter TOUS les events, jamais en annuler un.
# ─────────────────────────────────────────────────────────────
concurrency:
  group: jules-train-queue
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────
# Permissions explicites requises
# ─────────────────────────────────────────────────────────────
permissions:
  contents: write        # repos.merge + commit state file
  issues: write          # addLabels / removeLabel / comments / close
  pull-requests: write   # pulls.list

jobs:
  autoqueue:
    # ⚠️ TRIPLE GUARD — pièce centrale du Night Train v2 :
    # 1. CI doit être passée (success)
    # 2. La branche doit commencer par jules/
    # 3. La branche ne doit PAS être jules/train elle-même
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'jules/') &&
      github.event.workflow_run.head_branch != 'jules/train'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main (for ops/night-queue.json)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for state commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Autoqueue — SRE hardened v2
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const headBranch = context.payload.workflow_run.head_branch;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            console.log(`[NTv2] ════════════════════════════════════════`);
            console.log(`[NTv2] Autoqueue triggered for branch: ${headBranch}`);
            console.log(`[NTv2] Run: ${runUrl}`);

            // ═══════════════════════════════════════════════════════════
            // STEP 1 — Extract issue ID BEFORE merge (Hardening #1)
            // Branch-first: jules/<issueId>-slug
            // ═══════════════════════════════════════════════════════════
            const branchMatch = headBranch.match(/^jules\/(\d+)/);
            let issueNumber = null;

            // Also find the PR (needed for merge + fallback)
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${headBranch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              console.log(`[NTv2] No open PR found for ${headBranch}. Skipping.`);
              return;
            }
            const pr = prs[0];
            console.log(`[NTv2] Found PR #${pr.number}: ${pr.title}`);

            if (branchMatch) {
              issueNumber = parseInt(branchMatch[1], 10);
              console.log(`[NTv2] Issue extracted from branch: #${issueNumber}`);
            } else {
              // Fallback: Closes #N in PR body
              const bodyMatch = (pr.body || '').match(/(?:closes|fixes|resolves)\s*:?\s*#(\d+)/i);
              if (bodyMatch) {
                issueNumber = parseInt(bodyMatch[1], 10);
                console.log(`[NTv2] Issue extracted from PR body: #${issueNumber}`);
              }
            }

            if (!issueNumber) {
              console.error(`[NTv2] ❌ HARD_STOP: Cannot extract issue_id from branch "${headBranch}" or PR body.`);
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: pr.number,
                  labels: ['needs:human'],
                });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pr.number,
                  body: `⚠️ **Night Train STOP** — Could not extract issue number from branch \`${headBranch}\` or PR body.\n\nRun: [${context.runId}](${runUrl})`,
                });
              } catch (e) { /* best effort */ }
              return;
            }

            // ═══════════════════════════════════════════════════════════
            // STEP 2 — Read queue + validate issue is in queue (#6)
            // ═══════════════════════════════════════════════════════════
            const queuePath = 'ops/night-queue.json';
            if (!fs.existsSync(queuePath)) {
              console.error(`[NTv2] ❌ HARD_STOP: Queue file ${queuePath} not found.`);
              return;
            }

            let queue;
            try {
              queue = JSON.parse(fs.readFileSync(queuePath, 'utf-8'));
            } catch (e) {
              console.error(`[NTv2] ❌ HARD_STOP: Failed to parse queue: ${e.message}`);
              return;
            }

            if (!Array.isArray(queue) || queue.length === 0) {
              console.error(`[NTv2] ❌ HARD_STOP: Queue must be a non-empty JSON array.`);
              return;
            }

            console.log(`[NTv2] Queue: [${queue.join(', ')}] (${queue.length} items)`);

            const currentIdx = queue.indexOf(issueNumber);
            if (currentIdx === -1) {
              // Hardening #6: Hard STOP if issue not in queue
              console.error(`[NTv2] ❌ HARD_STOP: Issue #${issueNumber} NOT found in queue. No fallback.`);
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber,
                  labels: ['needs:human'],
                });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `⚠️ **Night Train STOP** — Issue #${issueNumber} is not in \`ops/night-queue.json\`.\nQueue: \`${JSON.stringify(queue)}\`\n\nRun: [${context.runId}](${runUrl})`,
                });
              } catch (e) { /* best effort */ }
              return;
            }

            // ═══════════════════════════════════════════════════════════
            // STEP 3 — Merge PR → jules/train (AFTER extraction + validation)
            // ═══════════════════════════════════════════════════════════
            let mergeSuccess = false;
            try {
              await github.rest.repos.merge({
                owner, repo,
                base: 'jules/train',
                head: headBranch,
                commit_message: `[train] Merge ${headBranch} (PR #${pr.number}) — Closes #${issueNumber}`,
              });
              mergeSuccess = true;
              console.log(`[NTv2] Merged ${headBranch} → jules/train ✅`);
            } catch (mergeErr) {
              console.error(`[NTv2] ❌ Merge failed: ${mergeErr.message}`);
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr.number,
                labels: ['needs:human'],
              });
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number,
                body: `⚠️ **Night Train STOP** — Merge conflict on \`${headBranch}\` → \`jules/train\`.\n\nRun: [${context.runId}](${runUrl})`,
              });
              return;
            }

            // ═══════════════════════════════════════════════════════════
            // STEP 4 — Close issue (Hardening #2: only if merge success)
            // ═══════════════════════════════════════════════════════════
            if (mergeSuccess) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber,
                  labels: ['ready'],
                });
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: issueNumber,
                    name: 'agent:jules',
                  });
                } catch (e) { /* already absent */ }

                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber,
                  state: 'closed',
                });
                // Strict close comment with PR mention
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `✅ Merged via PR #${pr.number} during Night Train v2 (queue-driven).\n\n| Field | Value |\n|-------|-------|\n| Queue position | ${currentIdx + 1}/${queue.length} |\n| Run | [${context.runId}](${runUrl}) |`,
                });
                console.log(`[NTv2] Closed issue #${issueNumber} with PR #${pr.number} ✅`);
              } catch (e) {
                console.log(`[NTv2] ⚠️ Could not close/label #${issueNumber}: ${e.message}`);
              }
            }

            // ═══════════════════════════════════════════════════════════
            // STEP 5 — Write state file (Hardening #4)
            // ═══════════════════════════════════════════════════════════
            if (mergeSuccess) {
              const state = {
                last_completed_issue: issueNumber,
                last_completed_at: new Date().toISOString(),
                last_completed_pr: pr.number,
                last_run_id: context.runId,
                queue_position: `${currentIdx + 1}/${queue.length}`,
              };
              const statePath = 'ops/night-train-state.json';
              try {
                fs.writeFileSync(statePath, JSON.stringify(state, null, 2) + '\n');
                execSync('git add ops/night-train-state.json');
                execSync(`git commit -m "ops: update night-train-state (completed #${issueNumber})" --allow-empty`);
                execSync('git push origin main');
                console.log(`[NTv2] State file updated: ${JSON.stringify(state)}`);
              } catch (e) {
                console.log(`[NTv2] ⚠️ State file commit failed (non-blocking): ${e.message}`);
              }
            }

            // ═══════════════════════════════════════════════════════════
            // STEP 6 — Find NEXT open issue in queue (Hardening #3, #7)
            // ═══════════════════════════════════════════════════════════
            let nextIssueNumber = null;
            let nextIssue = null;
            let nextIdx = -1;

            for (let i = currentIdx + 1; i < queue.length; i++) {
              const candidateNum = queue[i];
              try {
                const { data: candidate } = await github.rest.issues.get({
                  owner, repo, issue_number: candidateNum,
                });

                if (candidate.state !== 'open') {
                  console.log(`[NTv2] skip_closed: #${candidateNum} (state: ${candidate.state})`);
                  continue;
                }

                // Hardening #3: Idempotence — check existing jules/* PR
                const { data: openPRs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', per_page: 100,
                });
                const existingPR = openPRs.find(p =>
                  p.head.ref.startsWith(`jules/${candidateNum}`)
                );

                if (existingPR) {
                  console.log(`[NTv2] skip_has_open_pr: #${candidateNum} — PR #${existingPR.number} (${existingPR.head.ref})`);
                  continue;
                }

                nextIssueNumber = candidateNum;
                nextIssue = candidate;
                nextIdx = i;
                break;
              } catch (e) {
                console.log(`[NTv2] skip_error: #${candidateNum} — ${e.message}`);
                continue;
              }
            }

            // ═══════════════════════════════════════════════════════════
            // TELEMETRY (Hardening #7) — single canonical line
            // ═══════════════════════════════════════════════════════════
            if (nextIssueNumber) {
              console.log(`[NTv2] TELEMETRY: current_issue=${issueNumber} current_index=${currentIdx} next_issue=${nextIssueNumber} next_index=${nextIdx} queue_length=${queue.length}`);
            } else {
              console.log(`[NTv2] TELEMETRY: current_issue=${issueNumber} current_index=${currentIdx} next_issue=NONE queue_complete=true queue_length=${queue.length}`);
            }

            // ═══════════════════════════════════════════════════════════
            // STEP 7 — Queue complete (Hardening #5)
            // ═══════════════════════════════════════════════════════════
            if (!nextIssueNumber || !nextIssue) {
              console.log(`[NTv2] 🏁 queue_complete last_completed_issue=${issueNumber}`);
              // Comment on the last completed issue
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: [
                    `🏁 **Night Train v2 — Queue Complete**`,
                    ``,
                    `All issues in \`ops/night-queue.json\` have been processed.`,
                    ``,
                    `| Field | Value |`,
                    `|-------|-------|`,
                    `| Last issue | #${issueNumber} |`,
                    `| Queue | \`${JSON.stringify(queue)}\` |`,
                    `| Run | [${context.runId}](${runUrl}) |`,
                    `| Time | ${new Date().toISOString()} |`,
                  ].join('\n'),
                });
              } catch (e) { /* best effort */ }
              return;
            }

            console.log(`[NTv2] NEXT: #${nextIssueNumber} — ${nextIssue.title}`);

            // ═══════════════════════════════════════════════════════════
            // STEP 8 — Label + invoke Jules API for NEXT
            // ═══════════════════════════════════════════════════════════
            await github.rest.issues.addLabels({
              owner, repo, issue_number: nextIssueNumber,
              labels: ['agent:jules'],
            });

            const julesApiKey = process.env.JULES_API_KEY;
            if (!julesApiKey) {
              console.error('[NTv2] ❌ HARD_STOP: JULES_API_KEY not set.');
              await github.rest.issues.addLabels({
                owner, repo, issue_number: nextIssueNumber,
                labels: ['needs:human'],
              });
              return;
            }

            const nextBody = nextIssue.body || '(no body)';
            const prompt = [
              `You are Jules, an AI coding agent working on the betadvisor-app repository.`,
              ``,
              `## Your Task`,
              `Solve GitHub Issue #${nextIssueNumber}: ${nextIssue.title}`,
              ``,
              `## Issue Body`,
              nextBody,
              ``,
              `## Repository Rules`,
              `- Read AGENTS.md at the repo root for ALL coding conventions before writing any code.`,
              `- NEVER throw at module top-level for missing env vars. Use handler-level guards.`,
              `- Your PR body MUST contain "Closes #${nextIssueNumber}".`,
              `- Backend CI: cd apps/backend/src && python manage.py check`,
              `- Migration rule: 1 migration maximum per PR. Never generate 2 in the same app.`,
              `- Stripe rule: all Stripe logic in services.py or webhooks.py only, never in views.py.`,
              `- application_fee_percent MUST be 20 (explicit constant, not from settings.PLATFORM_FEE_PERCENT).`,
              ``,
              `## Branch Convention`,
              `Create your working branch from jules/train (the starting branch).`,
              `Branch naming: jules/${nextIssueNumber}-<short-slug>`,
            ].join('\n');

            const payload = {
              prompt,
              sourceContext: {
                source: `sources/github/${owner}/${repo}`,
                githubRepoContext: { startingBranch: 'jules/train' },
              },
              requirePlanApproval: false,
              automationMode: 'AUTO_CREATE_PR',
            };

            console.log(`[NTv2] Invoking Jules API for #${nextIssueNumber}...`);
            const response = await fetch('https://jules.googleapis.com/v1alpha/sessions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': julesApiKey,
              },
              body: JSON.stringify(payload),
            });

            const result = await response.json();
            if (response.ok) {
              console.log(`[NTv2] ✅ Jules session: ${result.name}`);
              console.log(`[NTv2] dispatched_jules issue=${nextIssueNumber} session=${result.name}`);

              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: nextIssueNumber,
                  body: [
                    `🚂 **Autoqueue** dispatched Jules on this issue.`,
                    ``,
                    `| Field | Value |`,
                    `|-------|-------|`,
                    `| Previous | #${issueNumber} (index ${currentIdx}) |`,
                    `| This issue | #${nextIssueNumber} (index ${nextIdx}) |`,
                    `| Jules session | \`${result.name}\` |`,
                    `| Run | [${context.runId}](${runUrl}) |`,
                    `| Queue progress | ${nextIdx + 1}/${queue.length} |`,
                  ].join('\n'),
                });
              } catch (e) {
                console.log(`[NTv2] ⚠️ Comment failed on #${nextIssueNumber}: ${e.message}`);
              }
            } else {
              console.error(`[NTv2] ❌ Jules API error (${response.status}): ${JSON.stringify(result)}`);
              await github.rest.issues.addLabels({
                owner, repo, issue_number: nextIssueNumber,
                labels: ['needs:human'],
              });
            }

            console.log(`[NTv2] ════════════════════════════════════════`);
