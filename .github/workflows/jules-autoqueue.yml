name: Jules — Autoqueue

# ─────────────────────────────────────────────────────────────────
# Night Train v3 — Autoqueue
# Triggered when CI passes on a jules/* branch.
# Validates queue membership, checks proof-of-work, squash-merges
# PR to main, closes issue, then dispatches next issue to Jules.
# ─────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# CRITICAL: cancel-in-progress MUST be false.
# We must process ALL CI completion events, never cancel one.
concurrency:
  group: jules-autoqueue
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  autoqueue:
    # TRIPLE GUARD:
    # 1. CI must have passed (success)
    # 2. Branch must start with jules/
    # 3. Branch must NOT be jules/train (legacy, safety net)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'jules/') &&
      github.event.workflow_run.head_branch != 'jules/train'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main (for queue file)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main

      - name: Autoqueue — validate, merge, chain
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const branch = context.payload.workflow_run.head_branch;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            console.log(`[autoqueue] ═══════════════════════════════════`);
            console.log(`[autoqueue] Branch: ${branch}`);

            // ── 1. Find the PR ───────────────────────────────────────
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              console.log(`[autoqueue] No open PR for ${branch}. Skipping.`);
              return;
            }
            const pr = prs[0];
            console.log(`[autoqueue] PR #${pr.number}: ${pr.title}`);

            // ── 2. Extract issue number ──────────────────────────────
            let issueNumber = null;
            const branchMatch = branch.match(/^jules\/(\d+)/);
            if (branchMatch) {
              issueNumber = parseInt(branchMatch[1], 10);
            } else {
              const bodyMatch = (pr.body || '').match(/(?:closes|fixes|resolves)\s*:?\s*#(\d+)/i);
              if (bodyMatch) issueNumber = parseInt(bodyMatch[1], 10);
            }

            if (!issueNumber) {
              console.error(`[autoqueue] ❌ Cannot extract issue from branch "${branch}" or PR body.`);
              await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: ['needs:human'] });
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number,
                body: `⚠️ **Autoqueue STOP** — Cannot extract issue number.\nBranch: \`${branch}\`\nRun: [${context.runId}](${runUrl})`,
              });
              return;
            }
            console.log(`[autoqueue] Issue: #${issueNumber}`);

            // ── 3. Read queue and validate ───────────────────────────
            const queuePath = 'ops/night-queue.json';
            if (!fs.existsSync(queuePath)) {
              console.error(`[autoqueue] ❌ Queue file not found.`);
              return;
            }

            let queue;
            try {
              queue = JSON.parse(fs.readFileSync(queuePath, 'utf-8'));
            } catch (e) {
              console.error(`[autoqueue] ❌ Cannot parse queue: ${e.message}`);
              return;
            }

            if (!Array.isArray(queue) || queue.length === 0) {
              console.error(`[autoqueue] ❌ Queue must be a non-empty array.`);
              return;
            }

            console.log(`[autoqueue] Queue: [${queue.join(', ')}]`);
            const currentIdx = queue.indexOf(issueNumber);

            if (currentIdx === -1) {
              console.error(`[autoqueue] ❌ Issue #${issueNumber} NOT in queue. Halting.`);
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['needs:human'] });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `⚠️ **Autoqueue STOP** — Issue #${issueNumber} is not in the active queue.\nQueue: \`${JSON.stringify(queue)}\`\nRun: [${context.runId}](${runUrl})`,
                });
              } catch (e) { /* best effort */ }
              return;
            }

            // ── 4. Proof-of-work guard ───────────────────────────────
            const NOISE_PATTERNS = [
              /^ops\//,
              /(^|\/)plan\.md$/,
              /(^|\/)plan_draft\.md$/,
              /(^|\/)README/i,
              /(^|\/)CONTRIBUTING/i,
              /(^|\/)CHANGELOG/i,
              /(^|\/)LICENSE/i,
              /(^|\/)\.gitignore$/,
              /^docs\//,
            ];

            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner, repo, pull_number: pr.number, per_page: 100,
            });

            const allFiles = prFiles.map(f => f.filename);
            const codeFiles = allFiles.filter(f => !NOISE_PATTERNS.some(p => p.test(f)));
            const additions = prFiles.reduce((s, f) => s + f.additions, 0);
            const deletions = prFiles.reduce((s, f) => s + f.deletions, 0);

            console.log(`[autoqueue] Diff: ${allFiles.length} files (+${additions}/-${deletions}), ${codeFiles.length} meaningful`);

            if (codeFiles.length === 0) {
              console.error(`[autoqueue] ❌ NOOP: PR #${pr.number} has no meaningful code changes.`);
              console.log(`[autoqueue] TELEMETRY: noop_issue=${issueNumber} noop_pr=${pr.number} files=${allFiles.join(',')}`);
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['needs:human'] });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: [
                    `⚠️ **Autoqueue HALT — No meaningful code changes**`,
                    ``,
                    `PR [#${pr.number}](https://github.com/${owner}/${repo}/pull/${pr.number}) has no real code.`,
                    `Files: \`${allFiles.join(', ') || '(none)'}\``,
                    `Meaningful: \`${codeFiles.join(', ') || '(none)'}\``,
                    `Run: [${context.runId}](${runUrl})`,
                  ].join('\n'),
                });
              } catch (e) { /* best effort */ }
              return;
            }

            console.log(`[autoqueue] ✅ Proof-of-work PASS (${codeFiles.length} code files)`);

            // ── 5. Squash merge PR to main ───────────────────────────
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: `[#${issueNumber}] ${pr.title}`,
                commit_message: `Closes #${issueNumber}\n\nAuto-merged by Night Train v3.`,
              });
              console.log(`[autoqueue] ✅ Squash-merged PR #${pr.number} → main`);
            } catch (mergeErr) {
              console.error(`[autoqueue] ❌ Merge failed: ${mergeErr.message}`);
              await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: ['needs:human'] });
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number,
                body: `⚠️ **Autoqueue STOP** — Merge failed for PR #${pr.number}.\nError: ${mergeErr.message}\nRun: [${context.runId}](${runUrl})`,
              });
              return;
            }

            // ── 6. Close issue + update labels ───────────────────────
            try {
              await github.rest.issues.update({
                owner, repo, issue_number: issueNumber, state: 'closed',
              });
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber, labels: ['done'],
              });
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNumber, name: 'agent:jules',
                });
              } catch (e) { /* label may not exist */ }

              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: [
                  `✅ **Completed** — Merged via PR #${pr.number} (squash to main).`,
                  ``,
                  `| Field | Value |`,
                  `|-------|-------|`,
                  `| Queue position | ${currentIdx + 1}/${queue.length} |`,
                  `| PR | #${pr.number} |`,
                  `| Run | [${context.runId}](${runUrl}) |`,
                ].join('\n'),
              });
              console.log(`[autoqueue] ✅ Closed issue #${issueNumber}`);
            } catch (e) {
              console.log(`[autoqueue] ⚠️ Could not close #${issueNumber}: ${e.message}`);
            }

            // ── 7. Find next open issue in queue ─────────────────────
            let nextNum = null;
            let nextIssue = null;
            let nextIdx = -1;

            for (let i = currentIdx + 1; i < queue.length; i++) {
              const candidate = queue[i];
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: candidate,
                });
                if (issue.state !== 'open') {
                  console.log(`[autoqueue] Skip #${candidate} (${issue.state})`);
                  continue;
                }

                // Idempotence: skip if there's already an open jules/* PR for this issue
                const { data: openPRs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', per_page: 100,
                });
                const existing = openPRs.find(p => p.head.ref.startsWith(`jules/${candidate}`));
                if (existing) {
                  console.log(`[autoqueue] Skip #${candidate} (existing PR #${existing.number})`);
                  continue;
                }

                nextNum = candidate;
                nextIssue = issue;
                nextIdx = i;
                break;
              } catch (e) {
                console.log(`[autoqueue] Skip #${candidate} (error: ${e.message})`);
              }
            }

            // Telemetry
            if (nextNum) {
              console.log(`[autoqueue] TELEMETRY: completed=${issueNumber} idx=${currentIdx} next=${nextNum} next_idx=${nextIdx} queue_len=${queue.length}`);
            } else {
              console.log(`[autoqueue] TELEMETRY: completed=${issueNumber} idx=${currentIdx} next=NONE queue_complete=true queue_len=${queue.length}`);
            }

            // ── 8. Queue complete? ───────────────────────────────────
            if (!nextNum) {
              console.log(`[autoqueue] 🏁 Queue complete! Last issue: #${issueNumber}`);
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: [
                    `🏁 **Night Train v3 — Sprint Complete**`,
                    ``,
                    `All issues in the queue have been processed.`,
                    `Queue: \`${JSON.stringify(queue)}\``,
                    `Time: ${new Date().toISOString()}`,
                  ].join('\n'),
                });
              } catch (e) { /* best effort */ }
              return;
            }

            // ── 9. Dispatch next issue to Jules ──────────────────────
            console.log(`[autoqueue] NEXT: #${nextNum} — ${nextIssue.title}`);

            await github.rest.issues.addLabels({
              owner, repo, issue_number: nextNum, labels: ['agent:jules'],
            });

            const julesApiKey = process.env.JULES_API_KEY;
            if (!julesApiKey) {
              console.error('[autoqueue] ❌ JULES_API_KEY not set.');
              await github.rest.issues.addLabels({ owner, repo, issue_number: nextNum, labels: ['needs:human'] });
              return;
            }

            const prompt = [
              `You are Jules, an AI coding agent working on the betadvisor-app repository.`,
              ``,
              `## Your Task`,
              `Solve GitHub Issue #${nextNum}: ${nextIssue.title}`,
              ``,
              `## Issue Body`,
              nextIssue.body || '(no body)',
              ``,
              `## Repository Rules`,
              `- Read AGENTS.md at the repo root for ALL coding conventions before writing any code.`,
              `- NEVER throw at module top-level for missing env vars. Use handler-level guards.`,
              `- Your PR body MUST contain "Closes #${nextNum}".`,
              `- Your PR MUST target the main branch.`,
              `- Backend CI: cd apps/backend/src && python manage.py check`,
              `- Migration rule: 1 migration maximum per PR.`,
              `- Stripe rule: all Stripe logic in services.py or webhooks.py only.`,
              `- application_fee_percent MUST be 20 (explicit constant).`,
              ``,
              `## Branch Convention`,
              `Create your working branch from main (the starting branch).`,
              `Branch naming: jules/${nextNum}-<short-slug>`,
            ].join('\n');

            const payload = {
              prompt,
              sourceContext: {
                source: `sources/github/${owner}/${repo}`,
                githubRepoContext: { startingBranch: 'main' },
              },
              requirePlanApproval: false,
              automationMode: 'AUTO_CREATE_PR',
            };

            console.log(`[autoqueue] Invoking Jules API for #${nextNum}...`);
            const response = await fetch('https://jules.googleapis.com/v1alpha/sessions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': julesApiKey,
              },
              body: JSON.stringify(payload),
            });

            const result = await response.json();
            if (response.ok) {
              console.log(`[autoqueue] ✅ Jules session: ${result.name}`);
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: nextNum,
                  body: [
                    `🚂 **Autoqueue** dispatched this issue to Jules.`,
                    ``,
                    `| Field | Value |`,
                    `|-------|-------|`,
                    `| Previous | #${issueNumber} (${currentIdx + 1}/${queue.length}) |`,
                    `| This issue | #${nextNum} (${nextIdx + 1}/${queue.length}) |`,
                    `| Session | \`${result.name}\` |`,
                    `| Run | [${context.runId}](${runUrl}) |`,
                  ].join('\n'),
                });
              } catch (e) { /* best effort */ }
            } else {
              console.error(`[autoqueue] ❌ Jules API error (${response.status}): ${JSON.stringify(result)}`);
              await github.rest.issues.addLabels({ owner, repo, issue_number: nextNum, labels: ['needs:human'] });
            }

            console.log(`[autoqueue] ═══════════════════════════════════`);
